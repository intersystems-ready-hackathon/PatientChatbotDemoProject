services:
  iris:
    build:
      context: ./iris
    ports:
    - 1972:1972
    - 52773:52773
    volumes:
    - ./iris/projects:/home/irisowner/dev
    restart: unless-stopped

  webgateway:
    image: containers.intersystems.com/intersystems/webgateway:2025.3
    secrets:
      - iris_pw
    hostname: localhost
    container_name: iris-wg-2
    ports:
    - "32783:80"
    - "32784:443"
    environment:
    - ISC_CSP_CONF_FILE=/webgateway-shared/CSP.conf
    - ISC_CSP_INI_FILE=/webgateway-shared/CSP.ini
    volumes:
    - ./iris/resources/webgateway:/webgateway-shared


  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    environment:
      - WEBUI_AUTH=False
      # - OLLAMA_BASE_URL=http://host.docker.internal:11434 # OLLAMA_BASE_URL=http://ollama:11434 
      - OPENAI_API_BASE_URL=https://plaza.iscinternal.com/genai/v1
      - OPENAI_API_KEY=${VLLM_API_KEY}
      - DEFAULT_MODELS=gpt-5
    volumes:
      - open-webui-data:/app/backend/data
    restart: unless-stopped

  timezone-mcp:
    build:
      context: ./mcp-servers/timezone
    ports:
      - "8001:8000"
    restart: unless-stopped

  iris-mcp:
    build:
      context: ./mcp-servers/iris-mcp
    ports:
      - "8002:8000"
    restart: unless-stopped

  medications-mcp:
    build:
      context: ./mcp-servers/medications-mcp
    ports:
      - "8003:8000"
    restart: unless-stopped
volumes:
  open-webui-data:

secrets:
   iris_pw:
     file: iris.secret