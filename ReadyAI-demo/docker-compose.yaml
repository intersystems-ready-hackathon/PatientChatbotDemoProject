services:
  iris:
    build:
      context: ./iris
    env_file:
      - .env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
    - 1973:1972
    - 8888:8888
    - 32791:80
    volumes:
    - ./iris/projects:/home/irisowner/dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "iris", "session", "IRIS", "-U", "READYAI", "halt"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  mcp-server:
    build:
      context: ./iris
    command: bash -c "cd /home/irisowner/dev && iris-mcp-server -c config.toml run"
    depends_on:
      iris:
        condition: service_healthy
    volumes:
    - ./iris/projects:/home/irisowner/dev
    network_mode: "service:iris"
    restart: unless-stopped

  langchain:
    build:
      context: ./langchain_external
    env_file:
      - .env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "8501:8501"
    volumes:
      - ./langchain_external:/app
    restart: unless-stopped
